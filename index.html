<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembukuan Trip Ojol</title>
    <meta name="theme-color" content="#00b14f">
    <style>
        body { font-family: Arial, sans-serif; margin: 15px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2e7d32; margin-top: 5px; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="number"], input[type="date"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        .date-nav { display: flex; gap: 5px; align-items: center; }
        .date-nav button { width: auto; flex: 1; padding: 10px; background-color: #0288d1; font-weight: bold; margin: 0; color: white; border: none; border-radius: 5px;}
        .date-nav input[type="date"] { flex: 3; }
        button { width: 100%; padding: 10px; background-color: #2e7d32; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-bottom: 8px; font-weight: bold; }
        button.btn-delete { background-color: #e53935; padding: 4px 8px; font-size: 12px; font-weight: bold; border-radius: 3px; width: auto; margin: 0; color: white; border: none;}
        .summary-box { margin-top: 15px; padding: 12px; background-color: #efebe9; border-radius: 5px; border-left: 5px solid #ff9800; }
        .summary-box h3 { margin: 0 0 8px 0; font-size: 16px; color: #5d4037; border-bottom: 1px dashed #bcaaa4; padding-bottom: 4px; }
        .summary-box p { margin: 6px 0; font-size: 14px; display: flex; justify-content: space-between; }
        .bold { font-weight: bold; color: #333; }
        .red-bold { font-weight: bold; color: #c62828; }
        .green-bold { font-weight: bold; color: #2e7d32; }
        .potongan-hemat-box { background-color: #fff3e0; padding: 10px; border: 1px solid #ffe0b2; border-radius: 5px; margin-top: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 6px 4px; text-align: center; }
        th { background-color: #e8f5e9; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { background-color: #e0e0e0; color: #333; padding: 8px; font-size: 13px; flex: 1; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background-color: #2e7d32; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pembukuan Trip Ojol</h2>
    
    <div class="tabs">
        <button class="tab-btn active" id="tabHari" onclick="gantiTampilan('hari')">Harian</button>
        <button class="tab-btn" id="tabMinggu" onclick="gantiTampilan('minggu')">Mingguan</button>
        <button class="tab-btn" id="tabBulan" onclick="gantiTampilan('bulan')">Bulanan</button>
    </div>

    <div class="form-group">
        <label for="tanggalTrip">Pilih Tanggal:</label>
        <div class="date-nav">
            <button onclick="navigasiTanggal(-1)">◀ Prev</button>
            <input type="date" id="tanggalTrip">
            <button onclick="navigasiTanggal(1)">Next ▶</button>
        </div>
    </div>

    <div class="form-group">
        <label for="jenisLayanan">Layanan:</label>
        <select id="jenisLayanan" onchange="updateLabelInput()">
            <option value="hemat">GrabBike Hemat</option>
            <option value="standard">GrabBike Standard</option>
        </select>
    </div>

    <div class="form-group">
        <label id="labelArgo" for="argoInput">Masukkan Gross (Rp):</label>
        <input type="number" id="argoInput" placeholder="Contoh: 10200">
    </div>
    
    <button onclick="tambahTrip()">Tambah Trip</button>

    <div class="summary-box">
        <h3 id="judulRingkasan">Ringkasan</h3>
        <p>Total Gross: <span id="sumGross" class="bold">Rp 0</span></p>
        <p>Potongan Std (8%): <span id="sumPotonganStandard" class="red-bold">Rp 0</span></p>
        <p>Potongan Hemat: <span id="sumPotonganHemat" class="red-bold">Rp 0</span></p>
        <p>Total Net (Bersih): <span id="sumNet" class="green-bold">Rp 0</span></p>

        <div class="potongan-hemat-box" id="boxPotonganAsliHemat">
            <label for="potonganAsliInput">Potongan Asli Hemat (Deduction):</label>
            <input type="number" id="potonganAsliInput" placeholder="Masukkan jika ada" oninput="simpanPotonganManual()">
        </div>
    </div>

    <table id="tabelTrip">
        <thead><tr id="headerTabel"><th>No</th><th>Layanan</th><th>Gross</th><th>Potongan</th><th>Net</th><th>Aksi</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let masterData = JSON.parse(localStorage.getItem('masterDataOjol')) || [];
    let potonganHematManual = JSON.parse(localStorage.getItem('potonganHematManualOjol')) || {};
    let modeTampilan = 'hari';

    document.getElementById('tanggalTrip').value = new Date().toISOString().slice(0,10);
    prosesDanTampilkan();

    function updateLabelInput() {
        const layanan = document.getElementById('jenisLayanan').value;
        document.getElementById('labelArgo').innerText = layanan === 'standard' ? "Masukkan Net (Rp):" : "Masukkan Gross (Rp):";
    }

    function autoDetectLevelDriver() {
        // Logika sederhana: jika ada banyak trip Hemat < 10200, kemungkinan Jawara
        let counts = masterData.filter(i => i.layanan === 'hemat' && i.gross <= 10200).length;
        return counts > 5 ? "Jawara" : "Ksatria";
    }

    function tambahTrip() {
        const tgl = document.getElementById('tanggalTrip').value;
        const input = parseInt(document.getElementById('argoInput').value);
        const lay = document.getElementById('jenisLayanan').value;
        if (!input) return;

        let g = (lay === 'standard') ? Math.round(input * (100/92)) : input;
        let p = (lay === 'standard') ? (g - input) : 0;
        masterData.push({ id: Date.now(), tanggal: tgl, layanan: lay, gross: g, potongan: p, net: g - p });
        localStorage.setItem('masterDataOjol', JSON.stringify(masterData));
        document.getElementById('argoInput').value = '';
        prosesDanTampilkan();
    }

    function simpanPotonganManual() {
        const tgl = document.getElementById('tanggalTrip').value;
        potonganHematManual[tgl] = parseInt(document.getElementById('potonganAsliInput').value) || 0;
        localStorage.setItem('potonganHematManualOjol', JSON.stringify(potonganHematManual));
        prosesDanTampilkan();
    }

    function prosesDanTampilkan() {
        const tgl = document.getElementById('tanggalTrip').value;
        const tbody = document.querySelector('#tabelTrip tbody');
        tbody.innerHTML = '';
        
        let totalGross = 0, totalPotStd = 0, totalPotHmt = 0;
        let data = masterData.filter(i => i.tanggal === tgl);
        let level = autoDetectLevelDriver();

        data.forEach((t, i) => {
            totalGross += t.gross;
            if(t.layanan === 'standard') totalPotStd += t.potongan;

            let p = 0;
            if(t.layanan === 'hemat') {
                let dasar = (level === 'Jawara') ? (t.gross * 0.08) : (t.gross * 0.12);
                p = Math.min(dasar, t.gross * 0.08); // Batas maksimal 8%
            }
            
            tbody.innerHTML += `<tr><td>${i+1}</td><td>${t.layanan}</td><td>${t.gross}</td><td>${Math.round(p)}</td><td>${t.gross - Math.round(p)}</td><td><button class="btn-delete" onclick="hapusBaris(${t.id})">X</button></td></tr>`;
        });

        totalPotHmt = potonganHematManual[tgl] !== undefined ? potonganHematManual[tgl] : Math.floor(data.filter(i => i.layanan === 'hemat').reduce((a, b) => a + (b.gross * 0.08), 0));

        document.getElementById('sumGross').innerText = "Rp " + totalGross.toLocaleString();
        document.getElementById('sumPotonganStandard').innerText = "Rp " + totalPotStd.toLocaleString();
        document.getElementById('sumPotonganHemat').innerText = "Rp " + totalPotHmt.toLocaleString();
        document.getElementById('sumNet').innerText = "Rp " + (totalGross - totalPotStd - totalPotHmt).toLocaleString();
    }

    function hapusBaris(id) {
        masterData = masterData.filter(i => i.id !== id);
        localStorage.setItem('masterDataOjol', JSON.stringify(masterData));
        prosesDanTampilkan();
    }

    function navigasiTanggal(n) {
        let d = new Date(document.getElementById('tanggalTrip').value);
        d.setDate(d.getDate() + n);
        document.getElementById('tanggalTrip').value = d.toISOString().slice(0,10);
        prosesDanTampilkan();
    }

    function gantiTampilan(m) { modeTampilan = m; prosesDanTampilkan(); }
</script>
</body>
</html>
