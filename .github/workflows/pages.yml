name: Deploy Pembukuan Ojol to Pages

on:
  push:
    branches: ["main"] # Eksekusi otomatis setiap Anda melakukan push ke branch main
  workflow_dispatch:   # Memunculkan tombol jalankan manual di web GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Tanda titik artinya mengambil index.html langsung dari folder luar

      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
